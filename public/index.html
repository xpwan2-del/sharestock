<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A股量化分析终端 - TopLenged</title>
    <meta name="description" content="A股量化分析终端，覆盖市场概览、龙头识别、产业链热力图、龙虎榜、公告扫描和神经网络分析。" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050816;
        color: #f8fafc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.2), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.22), transparent 30rem),
          #050816;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .card {
        width: min(920px, 100%);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 28px;
        padding: 48px;
        background: rgba(15, 23, 42, 0.74);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(18px);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(14, 165, 233, 0.16);
        color: #7dd3fc;
        font-weight: 700;
        letter-spacing: 0.08em;
        font-size: 12px;
        text-transform: uppercase;
      }
      h1 {
        margin: 24px 0 16px;
        font-size: clamp(42px, 8vw, 82px);
        line-height: 0.95;
        letter-spacing: -0.07em;
      }
      p {
        max-width: 720px;
        color: #cbd5e1;
        font-size: 18px;
        line-height: 1.8;
      }
      .actions {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 34px;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        padding: 14px 20px;
        font-weight: 800;
        transition: transform 0.18s ease, border-color 0.18s ease;
      }
      .button:hover {
        transform: translateY(-2px);
      }
      .primary {
        background: linear-gradient(135deg, #38bdf8, #8b5cf6);
        color: white;
      }
      .secondary {
        border: 1px solid rgba(148, 163, 184, 0.36);
        color: #e2e8f0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        margin-top: 38px;
      }
      .item {
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 18px;
        padding: 18px;
        background: rgba(2, 6, 23, 0.36);
        color: #dbeafe;
      }
      .hint {
        margin-top: 28px;
        color: #94a3b8;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <span class="badge">TopLenged Alpha Terminal</span>
        <h1>A股量化分析终端</h1>
        <p>
          面向 A 股市场的量化分析看板，覆盖实时行情、市场概览、产业链热力图、龙头识别、趋势逆转、龙虎榜、公告扫描、神经网络分析和每日报告。
        </p>
        <div class="actions">
          <a class="button primary" href="https://terminal.toplenged.com">进入量化终端</a>
          <a class="button secondary" href="https://www.toplenged.com/">返回主站</a>
        </div>
        <div class="grid">
          <div class="item">市场概览</div>
          <div class="item">龙头识别</div>
          <div class="item">产业链热力图</div>
          <div class="item">神经网络分析</div>
        </div>
        <p class="hint">
          当前 Vercel 子域建议绑定 stock.toplenged.com；Streamlit 终端建议部署到支持长进程的平台并绑定 terminal.toplenged.com。
        </p>
      </section>
    </main>
  </body>
</html>
